name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-security:
    runs-on: self-hosted

    steps:
      # Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Python Dependencies
      - name: Install Python Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      # Run Unit Tests
      - name: Run Unit Tests
        run: python3 -m pytest

      # SonarQube Scan
      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=devsecops-sonar \
            -Dsonar.sources=src \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        run: docker build -t devsecops-sonar:latest .

      # Trivy Docker Image Scan (JSON)
      - name: Trivy Scan Docker Image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: devsecops-sonar:latest
          format: json
          output: trivy-image-report.json
          severity: HIGH,CRITICAL
          exit-code: 1

      # Trivy IaC Scan (JSON)
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: trivy-iac-report.json
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Install Excel Dependencies
        if: always()
        run: pip3 install pandas openpyxl

      - name: Convert Trivy Image Report
        if: always()
        run: python3 scripts/convert_trivy_to_excel.py trivy-image-report.json trivy-image-report.xlsx

      - name: Convert Trivy IaC Report
        if: always()
        run: python3 scripts/convert_trivy_to_excel.py trivy-iac-report.json trivy-iac-report.xlsx
