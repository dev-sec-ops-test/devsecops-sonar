name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-security:
    runs-on: self-hosted

    steps:

      # -------------------------------
      # 1️⃣ Checkout Repository
      # -------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------
      # 2️⃣ Install Python Dependencies
      # -------------------------------
      - name: Install Python Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      # -------------------------------
      # 3️⃣ Run Unit Tests
      # -------------------------------
      - name: Run Unit Tests
        run: python3 -m pytest

      # -------------------------------
      # 4️⃣ SonarQube Scan (SAST)
      # -------------------------------
      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=devsecops-sonar \
            -Dsonar.sources=src \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      # -------------------------------
      # 5️⃣ Build Docker Image
      # -------------------------------
      - name: Build Docker Image
        run: docker build -t devsecops-sonar:latest .

      # -------------------------------
      # 6️⃣ Trivy Docker Image Scan
      # -------------------------------
      - name: Trivy Scan Docker Image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: devsecops-sonar:latest
          format: json
          output: trivy-image-report.json
          severity: HIGH,CRITICAL
          exit-code: 1

      # -------------------------------
      # 7️⃣ Trivy IaC Scan
      # -------------------------------
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: trivy-iac-report.json
          severity: HIGH,CRITICAL
          exit-code: 1

      # ---------------------------
      # send Reports To Wazuh Log
      # ---------------------------
      - name: Send Clean Summary to Wazuh
        if: always()
        run: |
          python3 scripts/trivy_summary_to_wazuh.py \
          trivy-image-report.json \
          devsecops-sonar:latest \
          >> /var/log/devsecops-trivy.log

      # -------------------------------
      # 8️⃣ Install Excel Dependencies
      # -------------------------------
      - name: Install Excel Dependencies
        if: always()
        run: pip3 install pandas openpyxl

      # -------------------------------
      # 9️⃣ Convert Reports to Excel
      # -------------------------------
      - name: Convert Trivy Image Report
        if: always()
        run: python3 scripts/convert_trivy_to_excel.py trivy-image-report.json trivy-image-report.xlsx

      - name: Convert Trivy IaC Report
        if: always()
        run: python3 scripts/convert_trivy_to_excel.py trivy-iac-report.json trivy-iac-report.xlsx

      # -------------------------------
      # 🔟 Upload Excel Artifacts
      # -------------------------------
      - name: Upload Trivy Image Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.xlsx

      - name: Upload Trivy IaC Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-iac-report
          path: trivy-iac-report.xlsx
