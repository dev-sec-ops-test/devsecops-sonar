name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-security:
    runs-on: self-hosted

    steps:
      # Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Python Dependencies
      - name: Install Python Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      # Run Unit Tests
      - name: Run Unit Tests
        run: python3 -m pytest

      # SonarQube Scan
      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=devsecops-sonar \
            -Dsonar.sources=src \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        run: docker build -t devsecops-sonar:latest .

      # Trivy Docker Image Scan (JSON)
      - name: Trivy Scan Docker Image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: devsecops-sonar:latest
          format: json
          output: trivy-image-report.json
          severity: HIGH,CRITICAL
          exit-code: 1

      # Trivy IaC Scan (JSON)
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: trivy-iac-report.json
          severity: HIGH,CRITICAL
          exit-code: 1

      # Install Excel Dependencies
      - name: Install Excel Dependencies
        if: always()
        run: pip3 install pandas openpyxl

      # Convert JSON Reports to Excel
      - name: Convert Reports to Excel
        if: always()
        run: |
          echo '
import json
import pandas as pd

def convert(json_file, excel_file):
    try:
        with open(json_file) as f:
            data = json.load(f)
    except:
        data = {}

    rows = []
    for result in data.get("Results", []):
        for vuln in result.get("Vulnerabilities", []) or []:
            rows.append({
                "Target": result.get("Target"),
                "VulnerabilityID": vuln.get("VulnerabilityID"),
                "PkgName": vuln.get("PkgName"),
                "InstalledVersion": vuln.get("InstalledVersion"),
                "Severity": vuln.get("Severity"),
                "Title": vuln.get("Title"),
            })

    df = pd.DataFrame(rows)
    df.to_excel(excel_file, index=False)

convert("trivy-image-report.json", "trivy-image-report.xlsx")
convert("trivy-iac-report.json", "trivy-iac-report.xlsx")
' > convert.py

          python3 convert.py

      # Upload Artifacts (Always)
      - name: Upload Trivy Image Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.xlsx

      - name: Upload Trivy IaC Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-iac-report
          path: trivy-iac-report.xlsx
