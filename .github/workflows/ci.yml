name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-security:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Run Unit Tests
        run: |
          python3 -m pytest

      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=devsecops-sonar \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ squ_6f40fea6da6cb09e8fde207beb689770fe0da5dc }}

      - name: Build Docker Image
        run: |
          docker build -t devsecops-sonar:latest .
