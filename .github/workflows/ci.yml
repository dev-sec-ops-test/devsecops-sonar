name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-security:
    runs-on: self-hosted

    steps:
      # Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Python Dependencies
      - name: Install Python Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      # Run Unit Tests
      - name: Run Unit Tests
        run: python3 -m pytest

      # SonarQube Scan
      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=devsecops-sonar \
            -Dsonar.sources=src \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        run: docker build -t devsecops-sonar:latest .

      # Trivy Docker Image Scan (JSON)
      - name: Trivy Scan Docker Image
        run: |
          trivy image -f json -o trivy-image-report.json devsecops-sonar:latest


      # Trivy IaC Scan (JSON)
      - name: Trivy IaC Scan
        run: |
          trivy config -f json -o trivy-iac-report.json .

      # Convert Reports to Excel
      - name: Convert JSON Reports to Excel
        run: |
          pip install pandas openpyxl
          python <<EOF
import json
import pandas as pd

def convert_json_to_excel(json_file, excel_file):
    with open(json_file) as f:
        data = json.load(f)

    rows = []
    for result in data.get("Results", []):
        for vuln in result.get("Vulnerabilities", []) or []:
            rows.append({
                "Target": result.get("Target"),
                "VulnerabilityID": vuln.get("VulnerabilityID"),
                "PkgName": vuln.get("PkgName"),
                "InstalledVersion": vuln.get("InstalledVersion"),
                "Severity": vuln.get("Severity"),
                "Title": vuln.get("Title"),
            })

    df = pd.DataFrame(rows)
    df.to_excel(excel_file, index=False)

convert_json_to_excel("trivy-image-report.json", "trivy-image-report.xlsx")
convert_json_to_excel("trivy-iac-report.json", "trivy-iac-report.xlsx")
EOF

      # Upload Artifacts (ALWAYS)
      - name: Upload Trivy Image Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.xlsx

      - name: Upload Trivy IaC Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-iac-report
          path: trivy-iac-report.xlsx
